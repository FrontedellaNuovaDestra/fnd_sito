<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FND | Fronte della Nuova Destra</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blu: #003366;
            --accent-red: #cc0000;
            --dark-bg: #030303;
            --text-silver: #e0e0e0;
        }

        /* Reset e Base */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--dark-bg); 
            color: var(--text-silver); 
            overflow-x: hidden; 
        }

        /* HEADER MONUMENTALE */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 5%; 
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 3px solid var(--accent-red);
            display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .brand-link { 
            display: flex; align-items: center; cursor: pointer; 
            text-decoration: none; border: none; background: none;
        }
        
        .logo-img { 
            height: 100px; /* Logo Ingrandito */
            width: auto; 
            margin-right: 20px;
            filter: drop-shadow(0 0 8px var(--accent-red));
            transition: transform 0.3s;
        }
        .brand-link:active .logo-img { transform: scale(0.95); }

        .brand-title { 
            text-align: left; line-height: 1;
            font-family: 'Lexend', sans-serif; font-weight: 900; 
            font-size: 1.3rem; color: white;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* MENU OVERLAY FULLSCREEN */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }
        #menu-overlay a {
            font-family: 'Lexend', sans-serif; font-size: 2.2rem; color: white;
            text-decoration: none; margin: 20px 0; text-transform: uppercase; 
            font-weight: 900; transition: 0.3s;
        }
        #menu-overlay a:hover { color: var(--accent-red); transform: scale(1.1); }
        .close-btn { position: absolute; top: 40px; right: 40px; font-size: 3.5rem; color: var(--accent-red); cursor: pointer; }

        /* HERO SECTION CON FALLBACK DI COLORE */
        .hero {
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 20px;
            /* Se l'immagine non carica, il gradiente blu-rosso mantiene lo stile */
            background: linear-gradient(135deg, rgba(0,51,102,0.85) 0%, rgba(204,0,0,0.4) 100%), 
                        url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1600&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }

        .hero h1 { 
            font-family: 'Lexend', sans-serif; font-size: clamp(2.3rem, 10vw, 4.8rem); 
            text-transform: uppercase; margin-top: 120px; letter-spacing: -1px;
            line-height: 1; text-shadow: 3px 3px 20px rgba(0,0,0,0.9);
        }

        /* DASHBOARD LIVE */
        .dashboard { display: flex; gap: 15px; margin-top: 40px; flex-wrap: wrap; justify-content: center; }
        .stat-box { 
            background: rgba(0,0,0,0.6); padding: 20px 30px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            min-width: 150px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-num { display: block; font-size: 2rem; font-weight: 900; color: var(--accent-red); margin-bottom: 5px; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }
